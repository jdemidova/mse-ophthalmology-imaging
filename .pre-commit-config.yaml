repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.7
    hooks:
      - id: uv-lock
        files: ^pyproject\.toml$

      - id: uv-export
        name: uv export -> requirements.txt (no dev)
        files: ^(pyproject\.toml|uv\.lock)$
        args: ["--frozen", "--no-dev", "--output-file=requirements.txt", "--quiet"]

      - id: uv-export
        name: uv export -> requirements-dev.txt (with dev)
        files: ^(pyproject\.toml|uv\.lock)$
        args: ["--frozen", "--group=dev", "--output-file=requirements-dev.txt", "--quiet"]